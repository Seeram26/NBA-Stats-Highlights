<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBA Stats & Highlights</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-image: url('2k26logo.jpg');
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover;
        color: #ffffff;
        font-family: 'Lucida Handwriting', cursive;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }

    body::before {
        content: '';
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: linear-gradient(135deg, rgba(15,15,15,0.8) 0%, rgba(58,10,10,0.8) 50%, rgba(200,16,46,0.8) 100%);
        z-index: 0;
    }

    /* Switch to red/black gradient when results are showing */
    body.results-active {
        background-image: none;
        background: linear-gradient(135deg, #0f0f0f 0%, #3a0a0a 50%, #c8102e 100%);
    }

    body.results-active::before {
        display: none;
    }

    .card {
        position: relative;
        z-index: 1;
        text-align: center;
        background: rgba(0, 0, 0, 0.75);
        padding: 40px;
        border-radius: 12px;
        width: 90%;
        max-width: 1000px;
    }

    h1 {
        font-size: 36px;
        margin-bottom: 24px;
        letter-spacing: 2px;
        color: #ffffff;
    }

    .search-row {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 30px;
    }

    .search-row input {
        padding: 12px 20px;
        width: 320px;
        border-radius: 6px;
        border: none;
        font-size: 16px;
        font-family: 'Lucida Handwriting', cursive;
        background: #1a1a1a;
        color: white;
    }

    .search-row button {
        padding: 12px 28px;
        background: #c8102e;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-family: 'Lucida Handwriting', cursive;
        cursor: pointer;
    }

    .search-row button:hover {
        background: #a00d24;
    }

    #results {
        margin-top: 20px;
        text-align: left;
    }

    h2 {
        font-size: 26px;
        margin-bottom: 10px;
        color: #c8102e;
    }

    h3 {
        font-size: 20px;
        margin: 20px 0 10px;
        border-bottom: 1px solid #333;
        padding-bottom: 6px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        background: #1a1a1a;
        border-radius: 8px;
        overflow: hidden;
    }

    th {
        background: #c8102e;
        padding: 12px;
        text-align: left;
    }

    td {
        padding: 10px 12px;
        border-bottom: 1px solid #2a2a2a;
    }

    tr:hover {
        background: #252525;
    }

    .hl {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px;
        background: #1a1a1a;
        border-radius: 8px;
        margin: 8px 0;
        text-decoration: none;
        color: white;
    }

    .hl:hover {
        background: #252525;
    }

    .hl img {
        width: 160px;
        border-radius: 4px;
    }
</style>
</head>
<body>

<div class="card">
    <h1>NBA Stats & Highlights</h1>
    <div class="search-row">
        <input type="text" id="team" placeholder="Enter team name (e.g. Knicks)">
        <button id="go">Search</button>
    </div>
    <div id="results"></div>
</div>

<script>
const input = document.getElementById("team");
const results = document.getElementById("results");

document.getElementById("go").addEventListener("click", search);
input.addEventListener("keypress", function (e) {
    if (e.key === "Enter") search();
});

// Search function
function search() {
    document.body.classList.remove("results-active");
    const team = input.value.trim();
    if (!team) {
        results.innerHTML = "Please enter a team name.";
        return;
    }
    results.innerHTML = "Loading...";
    fetch("/search?team=" + encodeURIComponent(team))
        .then(function (r) {
            if (!r.ok) throw new Error("Team not found");
            return r.json();
        })
        .then(render)
        .catch(function (err) {
            results.innerHTML = err.message;
        });
}

function render(data) {
    // Switch background when results load
    document.body.classList.add("results-active");

    const team = data.team || {};
    const players = (data.stats && data.stats.data) ? data.stats.data : [];
    const highlights = Array.isArray(data.highlights) ? data.highlights : [];
    let html = "";

    // Team name
    html += "<h2>" + (team.displayName || team.name || "Team") + "</h2>";

    // Stats table
    html += "<h3>Player Stats (2026)</h3>";
    if (players.length) {
        html += "<table><tr><th>Player</th><th>Pos</th><th>GP</th><th>PTS</th><th>REB</th><th>AST</th></tr>";
        players
            .filter(function (p) { return !p.isPlayoff; })
            .forEach(function (p) {
                html += "<tr>";
                html += "<td>" + p.playerName + "</td>";
                html += "<td>" + (p.position || "-") + "</td>";
                html += "<td>" + p.games + "</td>";
                html += "<td>" + p.points + "</td>";
                html += "<td>" + p.totalRb + "</td>";
                html += "<td>" + p.assists + "</td>";
                html += "</tr>";
            });
        html += "</table>";
    } else {
        html += "<p>No stats found.</p>";
    }

    // Highlights
    html += "<h3>Highlights</h3>";
    if (highlights.length) {
        highlights.slice(0, 15).forEach(function (h) {
            html += '<a class="hl" href="' + h.url + '" target="_blank">';
            if (h.imgUrl) html += '<img src="' + h.imgUrl + '">';
            html += h.title;
            html += "</a>";
        });
    } else {
        html += "<p>No highlights found.</p>";
    }

    results.innerHTML = html;
}
</script>

</body>
</html>
